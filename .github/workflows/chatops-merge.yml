name: ChatOps Merge

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  merge:
    if: >
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/merge')
    runs-on: ubuntu-latest

    steps:
      - name: Check commenter permission
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const username = context.actor;
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username
            });

            const allowed = ['admin', 'maintain', 'write'].includes(data.permission);
            if (!allowed) {
              core.setFailed(`User ${username} is not allowed to merge. Permission: ${data.permission}`);
            }

      - name: Get PR info
        id: pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr_number = context.payload.issue.number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr_number
            });

            if (pr.state !== 'open') {
              core.setFailed(`PR #${pr_number} is not open.`);
            }

            core.setOutput('number', pr_number.toString());

      - name: Check required status checks
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr_number = Number('${{ steps.pr.outputs.number }}');

            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr_number
            });

            const approvals = reviews.filter(r => r.state === 'APPROVED');
            if (approvals.length === 0) {
              core.setFailed('PR is not approved yet.');
            }

            const { data: commits } = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr_number
            });

            const sha = commits[commits.length - 1].sha;

            const { data: combined } = await github.rest.repos.getCombinedStatusForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha
            });

            if (combined.state !== 'success') {
              core.setFailed(`Required checks are not passing. Current state: ${combined.state}`);
            }

      - name: Merge PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr_number = Number('${{ steps.pr.outputs.number }}');

            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr_number,
              merge_method: 'squash'
            });

      - name: Update labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr_number = Number('${{ steps.pr.outputs.number }}');

            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr_number,
              name: 'Needs Review'
            }).catch(() => {});

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr_number,
              labels: ['Approved']
            }).catch(() => {});
