name: ChatOps Merge & Approve

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  chatops:
    if: >
      github.event.issue.pull_request && (
        startsWith(github.event.comment.body, '/merge') || 
        startsWith(github.event.comment.body, '/approve')
      )
    runs-on: ubuntu-latest

    steps:
      - name: Check commenter permission
        id: check_perm
        uses: actions/github-script@v7
        with:
          script: |
            const username = context.actor;
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username
            });

            const allowed = ['admin', 'maintain', 'write'].includes(data.permission);
            if (!allowed) {
              core.setFailed(`User ${username} is not allowed to trigger ChatOps. Permission: ${data.permission}`);
            }

      - name: Parse Command
        id: cmd
        run: |
          COMMENT="${{ github.event.comment.body }}"
          if [[ "$COMMENT" == /merge* ]]; then
            echo "action=merge" >> $GITHUB_OUTPUT
          elif [[ "$COMMENT" == /approve* ]]; then
            echo "action=approve" >> $GITHUB_OUTPUT
          fi

      - name: Handle Approve
        if: steps.cmd.outputs.action == 'approve'
        uses: actions/github-script@v7
        with:
          script: |
            const pr_number = context.payload.issue.number;
            
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr_number,
              event: 'APPROVE',
              body: `Approved via ChatOps by @${context.actor}`
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr_number,
              labels: ['Approved']
            }).catch(() => {});

            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr_number,
              name: 'Needs Review'
            }).catch(() => {});

      - name: Handle Merge
        if: steps.cmd.outputs.action == 'merge'
        uses: actions/github-script@v7
        with:
          script: |
            const pr_number = context.payload.issue.number;

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr_number
            });

            if (pr.state !== 'open') {
              core.setFailed(`PR #${pr_number} is not open.`);
            }

            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr_number
            });

            const approvals = reviews.filter(r => r.state === 'APPROVED');
            if (approvals.length === 0) {
              core.setFailed('PR is not approved yet.');
            }

            const { data: commits } = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr_number
            });
            const sha = commits[commits.length - 1].sha;

            const { data: combined } = await github.rest.repos.getCombinedStatusForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha
            });

            if (combined.state !== 'success' && combined.statuses.length > 0) {
              core.setFailed(`Required checks are not passing. Current state: ${combined.state}`);
            }

            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr_number,
              merge_method: 'squash'
            });
